<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <style>
        /* CSS: ڈیزائن اور اسٹائلنگ */
        body {
            background-color: #0f172a; /* گہرا نیلا رنگ */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .clock-container {
            background: #1e293b;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6;
            text-align: center;
        }

        .time {
            font-size: 60px;
            font-weight: bold;
            color: #3b82f6;
            text-shadow: 0 0 20px #3b82f6, 0 0 40px #1d4ed8;
            letter-spacing: 5px;
        }

        .date {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .ampm {
            font-size: 25px;
            margin-left: 10px;
            color: #10b981; /* سبز رنگ AM/PM کے لیے */
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div class="time" id="timeDisplay">
            00:00:00 <span class="ampm" id="ampmDisplay">AM</span>
        </div>
        <div class="date" id="dateDisplay">
            Monday, April 06, 2026
        </div>
    </div>

    <script>
        // JavaScript: وقت کو ہر سیکنڈ میں اپ ڈیٹ کرنے کے لیے
        function updateClock() {
            const now = new Date();
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';

            // 12 گھنٹوں والا فارمیٹ (12-hour format)
            hours = hours % 12;
            hours = hours ? hours : 12; // اگر 0 ہو تو اسے 12 کر دے

            // اگر ہندسہ 10 سے چھوٹا ہو تو شروع میں 0 لگانا
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            // وقت کو اسکرین پر ڈالنا
            document.getElementById('timeDisplay').innerHTML = 
                `${hours}:${minutes}:${seconds} <span class="ampm">${ampm}</span>`;

            // تاریخ کو فارمیٹ کرنا
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').innerText = now.toLocaleDateString('en-US', options);
        }

        // ہر 1 سیکنڈ (1000ms) کے بعد فنکشن کو دوبارہ چلانا
        setInterval(updateClock, 1000);

        // پیج لوڈ ہوتے ہی گھڑی شروع کرنا
        updateClock();
    </script>
</body>
</html>
